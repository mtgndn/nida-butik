services:
  postgres:
    image: postgres:16-alpine
    container_name: nida-butik-postgres
    environment:
      POSTGRES_DB: nida_butik
      POSTGRES_USER: boutique
      POSTGRES_PASSWORD: boutique123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
