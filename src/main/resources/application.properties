spring.application.name=nida-butik
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nida_butik}
spring.datasource.username=${DB_USERNAME:boutique}
spring.datasource.password=${DB_PASSWORD:boutique123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.error.include-message=never
server.error.include-binding-errors=never
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
